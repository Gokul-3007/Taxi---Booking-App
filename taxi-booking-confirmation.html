<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Booking Confirmation</title>
  <style>
    body{font-family:Segoe UI,Roboto,Arial,sans-serif;margin:0;padding:24px;background:#f6f7fb;color:#111}
    .card{max-width:820px;margin:28px auto;background:#fff;padding:22px;border-radius:12px;box-shadow:0 12px 30px rgba(12,20,40,0.08)}
    h1{margin:0 0 6px}
    .meta{color:#666;margin-bottom:18px}
    .row{display:flex;gap:12px;flex-wrap:wrap}
    .col{flex:1;min-width:220px}
    .label{color:#666;font-size:13px}
    .value{font-weight:600;font-size:16px;margin-top:6px}
    .actions{margin-top:18px;display:flex;gap:10px}
    .btn{padding:10px 14px;border-radius:10px;border:none;cursor:pointer}
    .btn-primary{background:#ff6b35;color:#fff}
    .btn-muted{background:#f1f1f1}
  </style>
</head>
<body>
  <div class="card">
    <h1>Booking Confirmed</h1>
    <div class="meta">Thank you — your ride is booked. Below are the trip details.</div>
    <div id="details">
      <div class="row">
        <div class="col"><div class="label">Pickup</div><div id="pickupVal" class="value">—</div></div>
        <div class="col"><div class="label">Drop</div><div id="dropVal" class="value">—</div></div>
      </div>
      <div class="row" style="margin-top:12px">
        <div class="col"><div class="label">Distance</div><div id="distanceVal" class="value">—</div></div>
        <div class="col"><div class="label">Estimated Time</div><div id="etaVal" class="value">—</div></div>
      </div>
      <div class="row" style="margin-top:12px">
        <div class="col"><div class="label">Vehicle</div><div id="vehicleVal" class="value">—</div></div>
        <div class="col"><div class="label">Fare</div><div id="fareVal" class="value">—</div></div>
      </div>
      <div style="margin-top:18px;color:#777;font-size:13px">Booked at: <span id="bookedAt">—</span></div>
    </div>
    <div class="actions">
      <button id="backBtn" class="btn btn-primary">Back to App</button>
      <button id="clearBtn" class="btn btn-muted">Clear Booking</button>
    </div>
  </div>

  <script>
    function safeParse(v){ try{return JSON.parse(v);}catch(e){return null;} }
    const raw = localStorage.getItem('lastBooking');
    const booking = safeParse(raw);
    if(!booking){ document.getElementById('details').innerHTML = '<div style="color:#b33">No booking data found. Open the app and confirm a booking first.</div>'; }
    else{
      document.getElementById('pickupVal').textContent = booking.pickup || '—';
      document.getElementById('dropVal').textContent = booking.drop || '—';
      document.getElementById('distanceVal').textContent = (booking.distance_km!=null? booking.distance_km+' km' : '—');
      document.getElementById('etaVal').textContent = (booking.eta_min!=null? booking.eta_min+' min' : '—');
      document.getElementById('vehicleVal').textContent = booking.vehicle || '—';
      document.getElementById('fareVal').textContent = booking.fare!=null? '₹'+booking.fare : '—';
      document.getElementById('bookedAt').textContent = booking.booked_at? new Date(booking.booked_at).toLocaleString() : '—';
    }

    document.getElementById('backBtn').addEventListener('click', ()=>{ window.location.href = 'taxi-booking-app-en.html'; });
    document.getElementById('clearBtn').addEventListener('click', ()=>{ localStorage.removeItem('lastBooking'); location.reload(); });
  </script>
</body>
</html>
